<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#gradient)" stroke-width="2"/>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Central node -->
  <circle cx="100" cy="100" r="20" fill="url(#gradient)"/>
  
  <!-- Connected nodes (representing system innovation) -->
  <!-- Top node -->
  <circle cx="100" cy="50" r="12" fill="#3b82f6" opacity="0.8"/>
  <line x1="100" y1="65" x2="100" y2="82" stroke="#3b82f6" stroke-width="2" opacity="0.6"/>
  
  <!-- Right node -->
  <circle cx="145" cy="100" r="12" fill="#10b981" opacity="0.8"/>
  <line x1="118" y1="100" x2="135" y2="100" stroke="#10b981" stroke-width="2" opacity="0.6"/>
  
  <!-- Bottom-left node -->
  <circle cx="70" cy="140" r="12" fill="#6366f1" opacity="0.8"/>
  <line x1="82" y1="115" x2="75" y2="130" stroke="#6366f1" stroke-width="2" opacity="0.6"/>
  
  <!-- Bottom-right node -->
  <circle cx="130" cy="140" r="12" fill="#f59e0b" opacity="0.8"/>
  <line x1="118" y1="115" x2="125" y2="130" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
  
  <!-- Company initials text below logo (optional for variety) -->
  <text x="100" y="170" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#1f2937">GSS</text>
</svg>
